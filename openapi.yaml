openapi: 3.0.0
info:
  title: My Sticky Shoes API
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/mock
    description: Local API
  - url: https://upcommingdomain-staging.com/api
    description: Staging API (not ready yet)
  - url: https://upcommingdomain-production.com/api
    description: Production API (not ready yet)

paths:
  /auth/login:
    post:
      summary: User Login
      operationId: login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: test@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/signup:
    post:
      summary: User Registration
      operationId: signup
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - confirmPassword
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  example: password123
                confirmPassword:
                  type: string
                  minLength: 6
                  example: password123
                name:
                  type: string
                  minLength: 2
                  example: John Doe
      responses:
        '200':
          description: Successful Signup
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Missing fields or invalid data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      summary: Get Current User
      operationId: getCurrentUser
      tags:
        - Auth
      responses:
        '200':
          description: User data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized request

  /auth/logout:
    post:
      summary: Logout user
      operationId: logout
      tags:
        - Auth
      responses:
        '200':
          description: Successful Logout
        '500':
          description: Internal server error

  /notifications/register:
    post:
      summary: Register FCM token for push notifications
      operationId: registerFCMToken
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Firebase Cloud Messaging token
      responses:
        '200':
          description: Token registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '400':
          description: Missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notifications/unregister:
    post:
      summary: Unregister FCM token (disable notifications)
      operationId: unregisterFCMToken
      tags:
        - Notifications
      responses:
        '200':
          description: Token unregistered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: "1"
        email:
          type: string
          format: email
          example: test@example.com
        name:
          type: string
          example: Test User

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    Errors:
      type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: string
          description: "Map of field names to error messages"
        message:
          type: string
      required:
        - errors
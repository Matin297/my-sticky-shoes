pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,css,md}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
    type-check:
      run: bunx tsc --noEmit

commit-msg:
  parallel: false
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:3000" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=placeholder" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=placeholder" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=placeholder" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=placeholder" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=placeholder" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=placeholder" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=placeholder" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_VAPID_KEY=placeholder" >> .env.local
      
      - name: Generate all assets
        run: bun run generate:all
      
      - name: Type check
        run: bun run type-check
      
      - name: Lint
        run: bun run lint
      
      - name: Build
        run: bun run build